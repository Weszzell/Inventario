services:
  postgres:
    image: postgres:16-alpine
    container_name: web-inventory-postgres-prod
    restart: unless-stopped
    env_file:
      - .env.production
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: docker/nuxt/Dockerfile
    container_name: web-inventory-app-prod
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
    ports:
      - "3001:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/system/status >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 8

volumes:
  postgres_prod_data:
